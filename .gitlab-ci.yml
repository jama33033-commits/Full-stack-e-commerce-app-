image: node:20

stages:
  - test
  - build

before_script:
  - npm ci

test_frontend:
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm run test -- --passWithNoTests
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
    paths:
      - frontend/coverage

build_frontend:
  stage: build
  script:
    - cd frontend
    - npm run build
  artifacts:
    paths:
      - frontend/dist

test_backend:
  stage: test
  script:
    - cd Backend
    - npm ci
    - node -c server.js
